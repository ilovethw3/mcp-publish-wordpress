[tool:pytest]
testpaths = mcp/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    --cov=mcp 
    --cov-report=html:htmlcov 
    --cov-report=xml:coverage.xml
    --cov-report=term-missing
    --cov-fail-under=80
    --strict-markers
    --disable-warnings
    -v
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    wordpress: WordPress相关测试
    auth: 认证相关测试
    database: 数据库相关测试